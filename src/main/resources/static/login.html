<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Raahi | Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
<div class="login-page">

    <div class="login-container">

        <div class="login-header">

            <h1>Welcome back!</h1>
            <p>
                Continue your journey with Raahi.
            </p>

        </div>


        <form class="login-form">

            <div class="input-group">

                <label>Email</label>

                <div class="input-box">
                    <i class="fa-regular fa-envelope"></i>

                    <input
                            type="email"
                            id="email"
                            placeholder="Enter your email"
                    />
                </div>
            </div>



            <div class="input-group">

                <label>Password</label>

                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>

                    <input
                            type="password"
                            id="password"
                            placeholder="Enter your password"
                    />

                    <button type="button" class="toggle-password">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>

            </div>


            <a href="#" class="forgot-password">

                Forgot password?

            </a>


            <button type="submit" class="login-btn">

                Login

            </button>

        </form>


        <div class="divider">

            <span>or</span>

        </div>


        <button class="google-btn">

            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                 alt="Google">

            <span>Continue with Google</span>

        </button>


        <p class="signup-text">

            Don't have an account?

            <a href="signup.html">

                Create one

            </a>

        </p>

    </div>

</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
