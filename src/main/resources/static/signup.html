<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Raahi | Sign Up</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
<div class="login-page">

    <div class="login-container">

        <div class="login-header">

            <h1>Create Account</h1>
            <p>Start your journey with Raahi today.</p>
        </div>
        <form class="login-form" id="signupForm">
        <div class="input-group">

            <label>Full Name</label>

            <div class="input-box">

                <i class="fa-regular fa-user"></i>

                <input
                        type="text"
                        id="fullName"
                        name="name"
                        placeholder="Enter your full name"
                />

            </div>

        </div>
            <div class="input-group">

                <label>Email</label>

                <div class="input-box">
                    <i class="fa-regular fa-envelope"></i>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your email"
                />
                </div>
            </div>



            <div class="input-group">

                <label>Password</label>

                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>

                    <input
                            type="password"
                            id="password"
                            placeholder="Enter your password"
                    />

                    <button type="button" class="toggle-password">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>

            </div>

            <div class="input-group">

                <label>Confirm Password</label>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Confirm your password"
                    />

                    <button type="button" class="toggle-password">
                        <i class="fa-regular fa-eye"></i>
                    </button>

                </div>

            </div>

            <button type="submit" class="login-btn">

                Create Account

            </button>

        </form>


        <div class="divider">

            <span>or</span>

        </div>


        <button class="google-btn">

            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                 alt="Google">

            <span>Continue with Google</span>

        </button>


        <p class="signup-text">

            Already have an account?
            <a href="login.html">

                Login

            </a>

        </p>

    </div>

</div>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
</body>

</html>
